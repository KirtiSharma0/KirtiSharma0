<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
     .p1{
        margin-top: 600px;
     }
      h1 {
            text-align: center; /* Center the text */

          }
          .big-button{
             padding: 20px 40px;
             font-size: 24px;
             background-color: #0a0227;

             border: none;
             border-radius: 10px;

</head>
