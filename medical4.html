<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical Consultation Form</title>
    <style>
         body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            background-image: url('darkbg.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: repeat;
        }

        form {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            max-width: 600px;
            background-color: rgba(255, 255, 255, 0.8);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            box-sizing: border-box;
        }

        label {
            display: block;
            margin-bottom: 10px;
        }

        select, input {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }

        button {
            background-color: #007BFF;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <form id="medicalForm">
        <!-- Existing form elements -->
        <label for="doctorType">Which type of doctor would you prefer?</label>
        <select id="doctorType" name="doctorType">
            <option value="select doctor type">select doctor type</option>
            <option value="homeopathy">Homeopathy</option>
            <option value="allopathy">Allopathy</option>
            <option value="ayurvedic">Ayurvedic</option>
        </select>

        <label for="drugDuration">Duration of current drug usage (if any):</label>
        <input type="text" id="drugDuration" name="drugDuration" placeholder="E.g., 2 months">

        <label for="treatmentDuration">Duration of past treatment (if any):</label>
        <input type="text" id="treatmentDuration" name="treatmentDuration" placeholder="E.g., 6 months">

        <button type="button" onclick="submitForm()">Submit</button>
 
    </form>

    <script>
        function submitForm() {
            const doctorType = document.getElementById("doctorType").value;
            const drugDuration = document.getElementById("drugDuration").value;
            const treatmentDuration = document.getElementById("treatmentDuration").value;

            let redirectPage = ""; // Initialize variable for the target page

            // Determine the target page based on the selected doctor type
            switch (doctorType) {
                case "allopathy":
                    redirectPage = "medical7.html";
                    break;
                case "homeopathy":
                    redirectPage = "medical6.html";
                    break;
                case "ayurvedic":
                    redirectPage = "medical8.html";
                    break;
                default:
                    // Handle other cases or provide a default page
                    break;
            }

            // Redirect to the determined page with query parameters
            const queryString = `?doctorType=${doctorType}&drugDuration=${drugDuration}&treatmentDuration=${treatmentDuration}`;
            window.location.href = redirectPage + queryString;
        }
    </script>

</body>
</html>
